name: Agent Platform CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"

jobs:

  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check backend/app --select E,F,W --ignore E501,W291,W293

  # ── Stage 2: Security Scan ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies for CVEs
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2022-42969 || true

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Create data directory
        run: mkdir -p backend/data

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX: agent-platform
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SQLITE_PATH: ./data/agent.db

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage.xml
          retention-days: 7

      - name: Notify on test failure
        if: failure()
        run: |
          echo "::error::Tests failed. Check the test results artifact for details."

  # ── Stage 4: Verify Production (main branch) ──────────────────────────────
  verify-production:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Railway to deploy
        run: sleep 60

      - name: Health check with retry
        run: |
          for i in 1 2 3; do
            curl --fail https://agent-platform-production-3b73.up.railway.app/health && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Notify on deployment failure
        if: failure()
        run: echo "::error::Production health check failed after 3 attempts. Check Railway deploy logs."
